<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX Viewer - Debug Lengkap</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/pptxjs@1.21.1/dist/pptxjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .container { width: 100%; max-width: 1100px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 25px 30px; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .upload-area { margin: 20px 0; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        #fileInput { display: none; }
        .custom-file-upload { background: #3498db; color: white; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .custom-file-upload:hover { background: #2980b9; }
        #fileName { color: #555; font-style: italic; }
        .status-box { margin: 15px 0; padding: 12px; background: #f8f9fa; border-left: 4px solid #6c757d; border-radius: 4px; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word; }
        .status-box.error { border-color: #e74c3c; background: #fdf2f2; }
        .status-box.success { border-color: #27ae60; background: #f0faf3; }
        .nav-bar { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .nav-btn { background: #ecf0f1; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #slideInfo { font-weight: 500; min-width: 100px; text-align: center; }
        .slide-container { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin: 20px auto; display: flex; justify-content: center; align-items: center; min-height: 400px; padding: 10px; }
        .slide-wrapper { display: none; width: 100%; }
        .slide-wrapper.active { display: block; }
        .slide-wrapper canvas { max-width: 100%; height: auto; margin: 0 auto; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 PPTX Viewer (Diagnostik)</h1>
        <p>Pilih file presentasi (.pptx). Setiap langkah akan ditampilkan di bawah.</p>
        
        <div class="upload-area">
            <label for="fileInput" class="custom-file-upload">📂 Pilih File PPTX</label>
            <input type="file" id="fileInput" accept=".pptx">
            <span id="fileName"></span>
        </div>
        
        <!-- Area status/log -->
        <div id="statusBox" class="status-box">
            Menunggu file dipilih...
        </div>
        
        <div id="viewerArea" style="display: none;">
            <div class="nav-bar">
                <button id="prevBtn" class="nav-btn" disabled>◀ Sebelumnya</button>
                <span id="slideInfo">Slide 0 / 0</span>
                <button id="nextBtn" class="nav-btn" disabled>Selanjutnya ▶</button>
            </div>
            <div id="slideContainer" class="slide-container">
                <div id="loadingMsg">Memproses presentasi...</div>
            </div>
        </div>
    </div>

    <script>
        $(function() {
            let slides = [];
            let currentSlide = 0;
            let totalSlides = 0;

            const $fileInput = $('#fileInput');
            const $fileName = $('#fileName');
            const $viewerArea = $('#viewerArea');
            const $slideContainer = $('#slideContainer');
            const $statusBox = $('#statusBox');
            const $prevBtn = $('#prevBtn');
            const $nextBtn = $('#nextBtn');
            const $slideInfo = $('#slideInfo');

            // Fungsi untuk menulis log ke status box
            function log(msg, isError = false) {
                $statusBox.removeClass('error success').addClass(isError ? 'error' : 'success');
                $statusBox.text(msg);
                console.log(isError ? '[ERROR]' : '[OK]', msg);
            }

            // Validasi apakah file adalah ZIP valid (langkah awal)
            async function validateZip(file) {
                log('Memvalidasi file sebagai ZIP...');
                const buffer = await file.arrayBuffer();
                try {
                    const zip = await JSZip.loadAsync(buffer);
                    // Cek apakah ada file [Content_Types].xml khas PPTX
                    if (zip.file('[Content_Types].xml')) {
                        log('File valid: struktur PPTX terdeteksi. Melanjutkan...');
                        return buffer; // kembalikan buffer untuk diproses lebih lanjut
                    } else {
                        throw new Error('File ZIP ditemukan, tetapi tidak memiliki [Content_Types].xml. Bukan file PPTX valid.');
                    }
                } catch (zipErr) {
                    throw new Error('File bukan ZIP/PPTX: ' + zipErr.message);
                }
            }

            // Render PPTX dari ArrayBuffer (lebih efisien)
            function renderPptxFromBuffer(buffer) {
                log('Mengonversi buffer ke base64 untuk pptxjs...');
                // pptxjs masih butuh base64, jadi konversi
                const blob = new Blob([buffer], {type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
                const reader = new FileReader();
                reader.onload = function() {
                    const dataUrl = reader.result;
                    const base64 = dataUrl.split(',')[1];
                    log('Base64 siap. Merender slide...');
                    doRender(base64);
                };
                reader.onerror = function() {
                    log('Gagal mengonversi buffer ke base64.', true);
                };
                reader.readAsDataURL(blob);
            }

            function doRender(base64) {
                $slideContainer.empty().append('<div>Merender slide...</div>');
                $viewerArea.show();
                
                try {
                    $("#slideContainer").pptxToHtml({
                        pptxBase64: base64,
                        slideMode: true,
                        slidesScale: "100%",
                        mediaProcess: true,
                        callback: function(result) {
                            slides = $('#slideContainer .slide-wrapper').toArray();
                            totalSlides = slides.length;
                            log(`Render selesai. Ditemukan ${totalSlides} slide.`);
                            
                            if (totalSlides === 0) {
                                log('Tidak ada slide yang bisa ditampilkan (mungkin tidak ada konten).', true);
                                $slideContainer.html('<p style="padding:20px; color:red;">Tidak ada slide ditemukan dalam file.</p>');
                                return;
                            }
                            $(slides).removeClass('active').hide();
                            currentSlide = 0;
                            showSlide(currentSlide);
                            updateNavigation();
                        },
                        error: function(err) {
                            log('Error dari pptxjs: ' + (err.message || err), true);
                            $slideContainer.html('<p style="padding:20px; color:red;">Gagal merender slide. Lihat log di atas.</p>');
                        }
                    });
                } catch (ex) {
                    log('Exception: ' + ex.message, true);
                }
            }

            function showSlide(index) {
                if (slides.length === 0) return;
                $(slides).removeClass('active').hide();
                $(slides[index]).addClass('active').show();
                $slideInfo.text(`Slide ${index + 1} / ${totalSlides}`);
            }

            function updateNavigation() {
                $prevBtn.prop('disabled', currentSlide === 0);
                $nextBtn.prop('disabled', currentSlide === totalSlides - 1);
            }

            // Event handler
            $fileInput.on('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;

                $fileName.text(file.name);
                $viewerArea.hide();
                slides = [];
                currentSlide = 0;
                totalSlides = 0;
                $slideContainer.empty();

                log(`Memproses file: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);

                try {
                    // Langkah 1: validasi ZIP
                    const buffer = await validateZip(file);
                    // Langkah 2: render
                    renderPptxFromBuffer(buffer);
                } catch (err) {
                    log('GAGAL: ' + err.message, true);
                    $viewerArea.hide();
                }
            });

            $prevBtn.on('click', function() {
                if (currentSlide > 0) {
                    currentSlide--;
                    showSlide(currentSlide);
                    updateNavigation();
                }
            });
            $nextBtn.on('click', function() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    showSlide(currentSlide);
                    updateNavigation();
                }
            });
            $(document).on('keydown', function(e) {
                if (!$viewerArea.is(':visible')) return;
                if (e.key === 'ArrowLeft') $prevBtn.click();
                else if (e.key === 'ArrowRight') $nextBtn.click();
            });
        });
    </script>
</body>
</html>
