<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX Viewer - Stabil</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 1100px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 25px 30px; }
        h1 { color: #2c3e50; }
        .upload-area { margin: 20px 0; display: flex; gap: 15px; align-items: center; }
        #fileInput { display: none; }
        .custom-file-upload { background: #3498db; color: white; padding: 12px 24px; border-radius: 6px; cursor: pointer; }
        .status { padding: 12px; margin: 10px 0; background: #f8f9fa; border-left: 4px solid #6c757d; }
        .status.error { border-color: red; background: #fee; }
        .nav-bar { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .nav-btn { background: #ecf0f1; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .slide-container { border: 1px solid #ddd; border-radius: 8px; min-height: 400px; padding: 10px; display: flex; justify-content: center; align-items: center; }
        .slide-wrapper { display: none; width: 100%; }
        .slide-wrapper.active { display: block; }
        .slide-wrapper canvas { max-width: 100%; height: auto; margin: 0 auto; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 PPTX Viewer</h1>
        <div class="upload-area">
            <label for="fileInput" class="custom-file-upload">📂 Pilih File PPTX</label>
            <input type="file" id="fileInput" accept=".pptx">
            <span id="fileName"></span>
        </div>
        <div id="statusBox" class="status">Memeriksa library...</div>
        <div id="viewerArea" style="display: none;">
            <div class="nav-bar">
                <button id="prevBtn" class="nav-btn" disabled>◀ Sebelumnya</button>
                <span id="slideInfo">Slide 0 / 0</span>
                <button id="nextBtn" class="nav-btn" disabled>Selanjutnya ▶</button>
            </div>
            <div id="slideContainer" class="slide-container"></div>
        </div>
    </div>

    <!-- Library dimuat di sini -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/pptxjs@1.21.1/dist/pptxjs.min.js"></script>

    <script>
        // Cek apakah library sudah siap
        function checkLibrary() {
            if (typeof $ === 'undefined') {
                return 'jQuery tidak terdeteksi.';
            }
            if (typeof JSZip === 'undefined') {
                return 'JSZip tidak terdeteksi.';
            }
            if (typeof $.fn.pptxToHtml === 'undefined') {
                return 'PPTXjs tidak terdeteksi (pptxToHtml bukan fungsi).';
            }
            return null; // semua OK
        }

        $(function() {
            const libError = checkLibrary();
            const $statusBox = $('#statusBox');
            if (libError) {
                $statusBox.addClass('error').text('❌ Gagal memuat library: ' + libError + 
                    '\n\nSilakan periksa koneksi internet atau gunakan file lokal. Lihat petunjuk di bawah.');
                return;
            }
            $statusBox.text('✅ Library siap. Silakan pilih file PPTX.');

            let slides = [], currentSlide = 0, totalSlides = 0;

            $('#fileInput').on('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                $('#fileName').text(file.name);
                $('#viewerArea').hide();
                $statusBox.text('Membaca file...');
                
                try {
                    const buffer = await file.arrayBuffer();
                    // Cek apakah file ZIP valid
                    await JSZip.loadAsync(buffer); // validasi
                    const blob = new Blob([buffer]);
                    const reader = new FileReader();
                    reader.onload = function() {
                        const base64 = reader.result.split(',')[1];
                        $statusBox.text('Merender slide...');
                        try {
                            $('#slideContainer').pptxToHtml({
                                pptxBase64: base64,
                                slideMode: true,
                                slidesScale: "100%",
                                mediaProcess: true,
                                callback: function() {
                                    slides = $('#slideContainer .slide-wrapper').toArray();
                                    totalSlides = slides.length;
                                    if (totalSlides === 0) {
                                        $statusBox.addClass('error').text('Tidak ada slide ditemukan.');
                                        return;
                                    }
                                    $(slides).removeClass('active').hide();
                                    currentSlide = 0;
                                    showSlide(currentSlide);
                                    $('#viewerArea').show();
                                    $statusBox.text(`Berhasil memuat ${totalSlides} slide.`);
                                },
                                error: function(err) {
                                    $statusBox.addClass('error').text('Error PPTXjs: ' + (err.message || err));
                                }
                            });
                        } catch (ex) {
                            $statusBox.addClass('error').text('Exception: ' + ex.message);
                        }
                    };
                    reader.readAsDataURL(blob);
                } catch (err) {
                    $statusBox.addClass('error').text('Gagal membaca file: ' + err.message);
                }
            });

            function showSlide(idx) {
                $(slides).removeClass('active').hide();
                $(slides[idx]).addClass('active').show();
                $('#slideInfo').text(`Slide ${idx+1} / ${totalSlides}`);
                $('#prevBtn').prop('disabled', idx === 0);
                $('#nextBtn').prop('disabled', idx === totalSlides-1);
            }

            $('#prevBtn').click(() => { if (currentSlide > 0) showSlide(--currentSlide); });
            $('#nextBtn').click(() => { if (currentSlide < totalSlides-1) showSlide(++currentSlide); });
        });
    </script>
</body>
</html>
