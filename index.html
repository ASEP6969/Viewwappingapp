<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX Viewer - Tanpa Membuka File</title>
    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/pptxjs@1.21.1/dist/pptxjs.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 25px 30px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .upload-area {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        #fileInput {
            display: none;
        }
        .custom-file-upload {
            background: #3498db;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .custom-file-upload:hover {
            background: #2980b9;
        }
        #fileName {
            color: #555;
            font-style: italic;
        }
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .nav-btn {
            background: #ecf0f1;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #2c3e50;
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            background: #bdc3c7;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #slideInfo {
            font-weight: 500;
            min-width: 100px;
            text-align: center;
        }
        .slide-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            margin: 20px auto;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            padding: 10px;
        }
        .slide-wrapper {
            display: none;
            width: 100%;
            height: 100%;
        }
        .slide-wrapper.active {
            display: block;
        }
        .slide-wrapper canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border: 1px solid #eee;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 PPTX Viewer</h1>
        <p>Pilih file presentasi (.pptx) dan lihat slide-nya langsung di sini.</p>
        
        <div class="upload-area">
            <label for="fileInput" class="custom-file-upload">📂 Pilih File PPTX</label>
            <input type="file" id="fileInput" accept=".pptx">
            <span id="fileName"></span>
        </div>
        
        <div id="viewerArea" style="display: none;">
            <div class="nav-bar">
                <button id="prevBtn" class="nav-btn" disabled>◀ Sebelumnya</button>
                <span id="slideInfo">Slide 0 / 0</span>
                <button id="nextBtn" class="nav-btn" disabled>Selanjutnya ▶</button>
            </div>
            <div id="slideContainer" class="slide-container">
                <div class="loading" id="loadingMsg">Memproses presentasi...</div>
            </div>
        </div>
    </div>

    <script>
        $(function() {
            let slides = [];           // array elemen div pembungkus slide
            let currentSlide = 0;
            let totalSlides = 0;

            const $fileInput = $('#fileInput');
            const $fileName = $('#fileName');
            const $viewerArea = $('#viewerArea');
            const $slideContainer = $('#slideContainer');
            const $loadingMsg = $('#loadingMsg');
            const $prevBtn = $('#prevBtn');
            const $nextBtn = $('#nextBtn');
            const $slideInfo = $('#slideInfo');

            // Baca file sebagai base64
            function readFileAsBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file); // hasil: "data:application/vnd.openxmlformats-officedocument...;base64,..."
                });
            }

            // Ekstrak base64 murni dari data URL
            function extractBase64(dataUrl) {
                return dataUrl.split(',')[1];
            }

            // Render PPTX setelah mendapatkan base64
            function renderPptx(base64) {
                // Hapus kontainer sebelumnya
                $slideContainer.empty();
                $slideContainer.append('<div class="loading" id="loadingMsg">Merender slide...</div>');

                // Gunakan pptxjs untuk merender seluruh presentasi ke dalam div#slideContainer
                // Opsi: slidesScale untuk skala, slideMode: true
                $("#slideContainer").pptxToHtml({
                    pptxBase64: base64,
                    slideMode: true,       // setiap slide dibungkus div dengan class "slide"
                    slidesScale: "100%",   // bisa disesuaikan
                    keyWordClass: 'slide-wrapper', // tambahan class
                    mediaProcess: true,
                    callback: function(result) {
                        // Setelah selesai render, ambil semua elemen slide
                        slides = $('#slideContainer .slide-wrapper').toArray();
                        totalSlides = slides.length;
                        
                        if (totalSlides === 0) {
                            $slideContainer.html('<p style="padding:20px;color:red;">Tidak ada slide yang dapat ditampilkan.</p>');
                            $viewerArea.hide();
                            return;
                        }

                        // Sembunyikan semua, tampilkan slide pertama
                        $(slides).removeClass('active').hide();
                        currentSlide = 0;
                        showSlide(currentSlide);
                        
                        // Update UI
                        updateNavigation();
                        $viewerArea.show();
                    },
                    error: function(err) {
                        console.error(err);
                        $slideContainer.html('<p style="padding:20px;color:red;">Gagal memproses file PPTX. Pastikan file valid.</p>');
                        $viewerArea.show();
                    }
                });
            }

            function showSlide(index) {
                if (slides.length === 0) return;
                $(slides).removeClass('active').hide();
                $(slides[index]).addClass('active').show();
                $slideInfo.text(`Slide ${index + 1} / ${totalSlides}`);
            }

            function updateNavigation() {
                $prevBtn.prop('disabled', currentSlide === 0);
                $nextBtn.prop('disabled', currentSlide === totalSlides - 1);
            }

            // Event: pilih file
            $fileInput.on('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                $fileName.text(file.name);
                $viewerArea.hide();
                slides = [];
                currentSlide = 0;
                totalSlides = 0;
                $slideContainer.empty().append('<div class="loading">Membaca file...</div>');
                
                try {
                    const dataUrl = await readFileAsBase64(file);
                    const base64 = extractBase64(dataUrl);
                    renderPptx(base64);
                } catch (err) {
                    alert('Gagal membaca file.');
                    console.error(err);
                }
            });

            // Navigasi
            $prevBtn.on('click', function() {
                if (currentSlide > 0) {
                    currentSlide--;
                    showSlide(currentSlide);
                    updateNavigation();
                }
            });

            $nextBtn.on('click', function() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    showSlide(currentSlide);
                    updateNavigation();
                }
            });

            // Keyboard support
            $(document).on('keydown', function(e) {
                if (!$viewerArea.is(':visible')) return;
                if (e.key === 'ArrowLeft') {
                    $prevBtn.click();
                } else if (e.key === 'ArrowRight') {
                    $nextBtn.click();
                }
            });
        });
    </script>
</body>
  </html>
